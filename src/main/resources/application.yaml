spring:
  application:
    name: fivespring-used-market
  servlet:
    multipart:
      max-file-size: ${AWS_S3_MAX_FILE_SIZE:5242880}
      max-request-size: ${AWS_S3_MAX_FILE_SIZE:5242880}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-components: always
      show-details: never
